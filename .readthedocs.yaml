version: 2

build:
  os: "ubuntu-lts-latest"
  tools:
    python: "3.13"

submodules:
  include: all
  recursive: true

sphinx:
  builder: html
  configuration: conf.py
  fail_on_warning: true

python:
  install:
   - method: pip
     path: .
     extra_requirements:
       - web

formats:
- pdf
- epub
- htmlzip


